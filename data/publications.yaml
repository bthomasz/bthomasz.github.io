  abstract: Structured sheet materials such as rod networks, multi-material shells, and laminates exhibit complex mechanical behavior. We present a moment-based homogenization method that infers curvature coupling using only uniaxial bending tests. Our approach computes macroscopic bending moments from native-scale simulations and enables accurate modeling of double-curvature behavior.
