- id: kps
  title: "Computational Design and Automated Fabrication of Kirchhoff-Plateau Surfaces"
  authors:
    - "J. Perez"
    - "M. Otaduy"
    - "B. Thomaszewski"
  venue: "ACM Transactions on Graphics (Proc. ACM SIGGRAPH 2017)"
  year: 2017
  thumbnail: "assets/images/publications/KPS.png"
  links:
    pdf: "assets/pdf/Perez17KPS.pdf"
    video: "https://youtu.be/a2fst73hA2A"
  project: true
  highlight: false
  abstract: >
    We present a computational pipeline for the design and fabrication
    of Kirchhoff-Plateau surfaces -- thin elastic rods bent into shape
    by soap film tension -- enabling new classes of self-supporting
    curved structures.
