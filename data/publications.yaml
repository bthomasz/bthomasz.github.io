- id: differentiable-voronoi
  title: Differentiable Voronoi Diagrams for Simulation of Cell-Based Mechanical Systems
  authors:
  - L. Numerow
  - Y. Li
  - S. Coros
  - B. Thomaszewski
  venue: ACM Transactions on Graphics (Proc. ACM SIGGRAPH 2024)
  year: 2024
  thumbnail: assets/images/publications/DiffVoronoi.jpg
  links:
    pdf: https://arxiv.org/abs/2404.18629
    video: https://crl.ethz.ch/videos/VoronoiFoam_video.mp4
  project: true
  highlight: true
  carousel_image: assets/images/carousel/DiffVoronoiSlider.jpg
  abstract: Navigating topological transitions in cellular mechanical systems is a significant challenge for existing simulation methods. While abstract models lack predictive capabilities at the cellular level, explicit network representations struggle with topology changes, and per-cell representations are computationally too demanding for large-scale simulations. To address these challenges, we propose a novel cell-centered approach based on differentiable Voronoi diagrams. Representing each cell with a Voronoi site, our method defines shape and topology of the interface network implicitly. In this way, we substantially reduce the number of problem variables, eliminate the need for explicit contact handling, and ensure continuous geometry changes during topological transitions. Closed-form derivatives of network positions facilitate simulation with Newton-type methods for a wide range of per-cell energies. Finally, we extend our differentiable Voronoi diagrams to enable coupling with
    arbitrary rigid and deformable boundaries. We apply our approach to a diverse set of examples, highlighting splitting and merging of cells as well as neighborhood changes. We illustrate applications to inverse problems by matching soap foam simulations to real-world images. Comparative analysis with explicit cell models reveals that our method achieves qualitatively comparable results at significantly faster computation times.
  bibtex: "@article{Numerow2024DiffVoronoi,\n  title   = {Differentiable Voronoi Diagrams for Simulation of Cell-Based Mechanical Systems},\n  author  = {Logan Numerow and Yue Li and Stelian Coros and Bernhard Thomaszewski},\n  journal = {ACM Transactions on Graphics (Proc. ACM SIGGRAPH 2024)},\n  year    = {2024}\n}"
