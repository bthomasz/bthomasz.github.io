# publications.yaml
# Single source of truth for all publications.
# Each entry generates a list item on publications.html, and (if `project: true`)
# a standalone page under projects/<id>/index.html
#
# Fields:
#   id          - unique slug, used for project page folder name (required if project: true)
#   title       - paper title
#   authors     - list of author names, in order
#   venue       - venue string (e.g. "Proc. ACM SIGGRAPH 2024")
#   year        - integer year, used for sorting and grouping
#   thumbnail   - path to thumbnail image, relative to site root
#   abstract    - paper abstract (used on project page; optional for list-only entries)
#   bibtex      - bibtex entry as a literal block (optional)
#   links:
#     pdf       - URL to PDF
#     video     - URL to video (YouTube/Vimeo link or local .mp4 path)
#     project   - URL to project page (external OR auto-filled if `project: true`)
#     code      - URL to code repo
#     supplemental - URL to supplemental material
#   project     - bool, if true a project page is generated at projects/<id>/
#   highlight   - bool, if true this entry appears in the homepage carousel
#   carousel_image - path to wide carousel image (only needed if highlight: true)

