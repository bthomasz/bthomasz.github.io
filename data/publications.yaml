    supplemental: assets/pdf/MomentumGNN-appendix.pdf
  project: true
  highlight: false
  teaser: assets/images/publications/momentum-gnn-teaser.jpg
  abstract: Graph neural networks (GNNs) have emerged as a versatile and efficient option for modeling the dynamic behavior of deformable materials. While GNNs generalize readily to arbitrary shapes, mesh topologies, and material parameters, existing architectures struggle to correctly predict the temporal evolution of key physical quantities such as linear and angular momentum. In this work, we propose MomentumGNN — a novel architecture designed to accurately track momentum by construction. Unlike existing GNNs that output unconstrained nodal accelerations, our model predicts per-edge stretching and bending impulses which guarantee the preservation of linear and angular momentum. We train our network in an unsupervised fashion using a physics-based loss, and we show that our method outperforms baselines in a number of common scenarios where momentum plays a pivotal role.
  bibtex: "@article{Wang2026,\n  title   = {Momentum-Conserving Graph Neural Networks for Deformable Objects},\n  author  = {Jiahong Wang and Logan Numerow and Stelian Coros and Christian Theobalt and Vahid Babaei and Bernhard Thomaszewski},\n  journal = {arXiv:2604.26097},\n  year    = {2026}\n}"
- id: q3t-prisms
  title: 'Q3T Prisms: A Linear-Quadratic Solid Shell Element for Elastoplastic Surfaces'
  authors:
  - J. Montes Maestre
  - S. Coros
  - B. Thomaszewski
  venue: Proc. ACM SIGGRAPH 2024
  year: 2024
  thumbnail: assets/images/publications/Q3T.png
  links:
    pdf: https://crl.ethz.ch/papers/q3t.pdf
    video: https://youtu.be/5LMjHe756WM
  project: true
  highlight: false
  abstract: We introduce an approach for simulating elastoplastic surfaces using quadratic through-the-thickness (Q3T) solid shell elements. Modeling the mechanics of deformable surfaces has been a cornerstone of graphics research for decades. Although thin shell models are suitable for many materials and applications, simulation-based planning of plastic forming processes requires attention to deformation in the thickness direction. Building on recent advances in the graphics community, we explore solid shell elements for modeling elastoplastic surfaces. Linear prism elements perform well for compressible materials such as thick cloth and foam mats. However, due to their inability to capture non-constant strain in the thickness direction, they suffer from severe locking artifacts when applied to incompressible and plastic materials. Q3T elements address this limitation with a minimal yet effective modification to linear prisms, resulting in significantly improved performance with only a
    moderate increase in computational cost. Through various examples, we demonstrate that Q3T elements closely match the qualitative behavior of reference simulations and provide accurate quantitative results compared to real-world deep drawing experiments.
