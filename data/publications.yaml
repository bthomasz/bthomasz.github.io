    video: https://youtu.be/RR-lyQ-8Bqs
  project: true
  highlight: false
  bibtex: "@article{Zhou2025ClosedForm,\n  title   = {Closed-Form Construction of Voronoi Diagrams with Star-Shaped Metrics},\n  author  = {Haoyang Zhou and Logan Numerow and Stelian Coros and Bernhard Thomaszewski},\n  journal = {ACM Transactions on Graphics (Proc. ACM SIGGRAPH Asia 2025)},\n  year    = {2025}\n}"
  abstract: Cellular patterns, from planar ornaments to architectural surfaces and mechanical metamaterials, blend aesthetics with functionality. Homogeneous patterns like isohedral tilings offer simplicity and symmetry but lack flexibility, particularly for heterogeneous designs. They cannot smoothly interpolate between tilings or adapt to double-curved surfaces without distortion. Voronoi diagrams provide a more adaptable patterning solution. They can be generalized to star-shaped metrics, enabling diverse cell shapes and continuous grading by interpolating metric parameters. We introduce a novel, closed-form, fully differentiable formulation for Voronoi diagrams with piecewise linear star-shaped metrics, enabling optimization of site positions and metric parameters to meet aesthetic and functional goals. It naturally extends to arbitrary dimensions, including curved 3D surfaces. For improved on-surface patterning, we propose a per-sector parameterization of star-shaped metrics, ensuring
    uniform cell shapes in non-regular neighbourhoods. We demonstrate our approach by generating diverse patterns, from homogeneous to continuously graded designs, with applications in decorative surfaces and metamaterials.
  teaser: assets/images/publications/closed-form-construction-of-voronoi-diagrams-with-star-shape-teaser.jpg
