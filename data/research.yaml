      pub_id: neural-modes
    - subtitle: Neural Cloth Simulation
      image: assets/images/research/HoodSlider.jpg
      pub_id: hood
    - subtitle: Neural Topology Optimization
      image: assets/images/research/NtopoSlider.jpg
      pub_id: ntopo-mesh-free-topology-optimization-using-implicit-neural-

- id: structured-materials
  nav_label: Structured Materials
  title: Structured Materials
  card_image: assets/images/research/ScalesSlider.jpg
  intro: >
    Structured materials exhibit extraordinary mechanical properties,
    enabling applications in robotics, architecture, and many fields of
    engineering. Our research focuses on computational modeling,
    characterization, and inverse design of these materials to achieve
    tunable stiffness. By integrating physics-based simulation with machine
    learning and optimization, we develop predictive tools that reveal
    emergent behaviors and guide the creation of novel structures.
