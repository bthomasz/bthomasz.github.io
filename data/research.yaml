    - subtitle: Optimization-Based Gait Design
      image: assets/images/research/RobotDesigner1.jpg
      pub_id: interactive-design-of-3d-printable-robotic-creatures
    - subtitle: Synergies between Wheels and Legs
      image: assets/images/research/Skaterbots.jpg
      pub_id: skaterbots-optimization-based-design-and-motion-synthesis-fo

- id: smart-simulation
  nav_label: Smart Simulation
  title: Smart Simulation
  card_image: assets/images/research/DiffVoronoiSlider.jpg
  intro: >
    Balancing accuracy, efficiency, and flexibility is a core challenge in
    computational modeling, especially for complex physical and mechanical
    systems. High-fidelity simulations capture rich physical behaviors but
    are often computationally expensive, while faster methods risk
    sacrificing realism. Our research focuses on developing computational
    models that retain essential physical accuracy while remaining scalable
    and adaptable across different problem domains. By integrating
    physics-based simulation, data-driven techniques, and differentiable
    simulation, we aim to create models that efficiently solve a broad range
    of engineering and scientific challenges, from metamaterials and robotics
    to biological tissues.
  highlights:
    - subtitle: Differentiable Voronoi Diagrams
      image: assets/images/research/DiffVoronoiSlider.jpg
      pub_id: differentiable-voronoi
    - subtitle: Differentiable Contact for Soft Body Simulations
      image: assets/images/research/DeformableContactSlider.jpg
      pub_id: deformable-contact
    - subtitle: Differentiable Geodesic Distance
      image: assets/images/research/DiffGeoDistSlider.jpg
      pub_id: differentiable-geodesic-distance
    - subtitle: Efficient Solid Shell Elements
      image: assets/images/research/Q3TSlider.jpg
      pub_id: q3t-prisms

- id: digital-humans-biomechanics
  nav_label: Digital Humans & Biomechanics
  title: Digital Humans & Biomechanics
  card_image: assets/images/research/OrthognathicSlider.jpg
  intro: >
    The advancement of digital humans and biomechanical simulation is
    transforming fields ranging from medicine to robotics and virtual
    reality. By developing computational models of the human body, we can
    gain deeper insights into movement, injury mechanics, and personalized
    healthcare. Simulation enables predictive modeling for surgical planning,
    ergonomic design, and virtual avatars with realistic motion and
    deformation. However, accurately capturing the complex interplay of soft
    tissue mechanics, skeletal dynamics, and neuromuscular control remains a
    significant challenge. Our research focuses on bridging this gap through
    physics-based simulations, data-driven modeling, and AI-enhanced
    techniques, pushing the boundaries of digital human representation for
    real-world applications.
  highlights:
    - subtitle: Differentiable Biomechanical Simulation
      image: assets/images/research/OrthognathicSlider.jpg
      pub_id: differentiable-simulation-for-outcome-driven-orthognathic-su
    - subtitle: Kinesthetic Garments
      image: assets/images/research/KinestheticSlider.jpg
      pub_id: computational-design-of-kinesthetic-garments
    - subtitle: Physics-Enhanced Facial Animation
      image: assets/images/research/PhysicalBlendshapes.png
      pub_id: enriching-facial-blendshape-rigs-with-physical-simulation
    - subtitle: Neural Baking of Facial Physics
      image: assets/images/publications/neuriphy-neural-baking-of-physics-based-deformations-for-fac.jpg
      pub_id: neuriphy-neural-baking-of-physics-based-deformations-for-fac
