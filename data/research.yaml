- id: neural-simulation
  nav_label: Neural Simulation
  title: Simulation and Machine Learning
  card_image: assets/images/research/NMFSlider.jpg
  intro: >
    From the physics of soft tissues to the mechanics of complex materials,
    accurate simulation is key to understanding and predicting real-world
    behavior. However, traditional computational models are often costly,
    requiring trade-offs between accuracy and efficiency. Our research
    bridges simulation and machine learning to develop data-driven models
    that accelerate computations while preserving physical fidelity. By
    combining physics-based reasoning with modern AI techniques, we aim to
    push the boundaries of predictive modeling—enabling faster, more
    scalable, and more intelligent simulations for applications ranging from
    digital humans to advanced materials.
